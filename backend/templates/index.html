<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Question Solver</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  :root {
    --bg:      #0a0a0f;
    --surface: #12121a;
    --card:    #1a1a26;
    --border:  #2a2a3e;
    --accent:  #7c6aff;
    --accent2: #ff6a9b;
    --green:   #4fffb0;
    --yellow:  #ffd966;
    --text:    #e8e8f0;
    --muted:   #6b6b8a;
    --radius:  14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999;
  }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, rgba(124,106,255,.08), transparent);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }

  .logo { display: flex; align-items: center; gap: 10px; font-size: 1.15rem; font-weight: 800; }
  .logo-icon {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: grid; place-items: center; font-size: 1rem;
  }

  .status-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 13px; border-radius: 999px;
    background: var(--card); border: 1px solid var(--border);
    font-family: 'Space Mono', monospace; font-size: .75rem;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: all .3s; }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.solving   { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); animation: pulse .8s infinite; }
  .status-dot.done      { background: var(--green); }
  .status-dot.error     { background: #ff5555; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 24px 28px;
    max-width: 1300px;
    margin: 0 auto;
  }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; padding: 16px; }
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .card-header {
    padding: 13px 18px;
    border-bottom: 1px solid var(--border);
    font-size: .78rem; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
    display: flex; align-items: center; gap: 8px;
  }

  .card-body { padding: 20px; flex: 1; overflow-y: auto; }

  /* ── Upload Zone ── */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all .25s;
    position: relative;
    background: var(--surface);
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(124,106,255,.06);
  }
  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 2.4rem; margin-bottom: 10px; }
  .upload-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
  .upload-sub { font-size: .8rem; color: var(--muted); font-family: 'Space Mono', monospace; }

  /* ── Camera Button ── */
  .btn-row { display: flex; gap: 10px; margin-top: 14px; }

  .btn {
    flex: 1; padding: 12px 16px; border-radius: 10px; border: none;
    font-family: 'Syne', sans-serif; font-size: .9rem; font-weight: 700;
    cursor: pointer; transition: all .2s;
  }
  .btn-camera {
    background: linear-gradient(135deg, var(--accent), #5a4ae0);
    color: #fff; box-shadow: 0 4px 18px rgba(124,106,255,.35);
  }
  .btn-camera:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(124,106,255,.5); }
  .btn-gallery {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-gallery:hover { background: var(--border); }

  /* hidden file inputs */
  #camera-input, #gallery-input { display: none; }

  /* ── Preview ── */
  .preview-wrap {
    margin-top: 16px;
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface);
    display: none;
    position: relative;
  }
  .preview-wrap img { width: 100%; display: block; max-height: 320px; object-fit: contain; }
  .preview-label {
    position: absolute; top: 8px; left: 8px;
    padding: 3px 10px; border-radius: 6px;
    background: rgba(10,10,15,.75); backdrop-filter: blur(6px);
    font-family: 'Space Mono', monospace; font-size: .7rem; color: var(--accent2);
    border: 1px solid rgba(255,106,155,.2);
  }

  /* ── Solve button ── */
  .btn-solve {
    width: 100%; margin-top: 14px; padding: 14px;
    border-radius: 10px; border: none;
    background: linear-gradient(135deg, var(--accent2), #c0365e);
    color: #fff; font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 800; cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,106,155,.35);
    transition: all .2s; display: none;
  }
  .btn-solve:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(255,106,155,.5); }
  .btn-solve:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* ── Stats ── */
  .stat-row { display: flex; gap: 10px; margin-top: 16px; }
  .stat {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 9px; padding: 10px 14px; font-family: 'Space Mono', monospace;
  }
  .stat-val { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: .68rem; color: var(--muted); margin-top: 2px; }

  /* ── Solution Panel ── */
  .typing { display: none; gap: 6px; align-items: center; padding: 16px 0;
            font-size: .85rem; color: var(--muted); font-family: 'Space Mono', monospace; }
  .typing.active { display: flex; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    animation: bounce 1s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(.8);opacity:.4} 40%{transform:scale(1.2);opacity:1} }

  .solution-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 48px 20px; color: var(--muted);
    font-family: 'Space Mono', monospace; font-size: .8rem; text-align: center;
  }
  .sol-icon { font-size: 2.8rem; opacity: .25; }

  .solution-content { font-size: .92rem; line-height: 1.8; }

  /* solution HTML blocks */
  .subject-tag {
    display: inline-block; padding: 4px 12px; border-radius: 6px;
    background: linear-gradient(135deg, var(--accent), #5a4ae0);
    color: #fff; font-size: .75rem; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase; margin-bottom: 14px;
  }
  .detected-question {
    background: rgba(124,106,255,.08); border-left: 3px solid var(--accent);
    padding: 12px 16px; border-radius: 0 8px 8px 0; margin-bottom: 16px;
    font-size: .88rem;
  }
  .solution-steps {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; margin-bottom: 16px;
    line-height: 1.9; white-space: pre-wrap;
  }
  .final-answer {
    background: linear-gradient(135deg, rgba(79,255,176,.1), rgba(79,255,176,.04));
    border: 1px solid rgba(79,255,176,.3);
    border-radius: 10px; padding: 14px 18px;
    font-size: 1rem; font-weight: 700; color: var(--green);
  }
  .no-question {
    color: var(--yellow); background: rgba(255,217,102,.07);
    border: 1px dashed rgba(255,217,102,.3);
    border-radius: 10px; padding: 16px;
    font-family: 'Space Mono', monospace; font-size: .82rem;
  }
  .error {
    color: #ff5555; background: rgba(255,85,85,.07);
    border: 1px dashed rgba(255,85,85,.3);
    border-radius: 10px; padding: 16px;
    font-family: 'Space Mono', monospace; font-size: .82rem;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🔬</div>
    Smart Question Solver
  </div>
  <div class="status-pill">
    <div class="status-dot" id="dot"></div>
    <span id="status-text">Connecting...</span>
  </div>
</header>

<div class="layout">

  <!-- LEFT: Upload Panel -->
  <div class="card">
    <div class="card-header">📸 Upload Question</div>
    <div class="card-body">

      <!-- Drag & Drop Zone -->
      <div class="upload-zone" id="drop-zone">
        <input type="file" id="drop-input" accept="image/*"/>
        <div class="upload-icon">🖼️</div>
        <div class="upload-title">Drag & drop a photo here</div>
        <div class="upload-sub">or click to browse files</div>
      </div>

      <!-- Mobile buttons -->
      <div class="btn-row">
        <button class="btn btn-camera" onclick="document.getElementById('camera-input').click()">
          📷 Take Photo
        </button>
        <button class="btn btn-gallery" onclick="document.getElementById('gallery-input').click()">
          🖼 Gallery
        </button>
      </div>
      <input type="file" id="camera-input"  accept="image/*" capture="environment"/>
      <input type="file" id="gallery-input" accept="image/*"/>

      <!-- Preview -->
      <div class="preview-wrap" id="preview-wrap">
        <div class="preview-label">PREVIEW</div>
        <img id="preview-img" alt="Preview"/>
      </div>

      <!-- Solve button -->
      <button class="btn-solve" id="solve-btn" onclick="uploadAndSolve()">
        ⚡ Solve This Question
      </button>

      <!-- Stats -->
      <div class="stat-row">
        <div class="stat">
          <div class="stat-val" id="solve-count">0</div>
          <div class="stat-label">Solved</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="last-time">—</div>
          <div class="stat-label">Last solve</div>
        </div>
      </div>

    </div>
  </div>

  <!-- RIGHT: Solution Panel -->
  <div class="card">
    <div class="card-header">🧠 AI Solution</div>
    <div class="card-body">
      <div class="typing" id="typing">
        <span></span><span></span><span></span>
        &nbsp;Claude is solving...
      </div>
      <div id="solution-area">
        <div class="solution-placeholder">
          <div class="sol-icon">💡</div>
          <div>Upload a photo of any question</div>
          <div style="font-size:.7rem;opacity:.5;margin-top:4px">Math, Physics, Chemistry, English — anything</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const socket = io();
  let selectedFile = null;
  let solveCount = 0;

  // ── Socket ──
  socket.on("connect",    () => setStatus("connected", "🟢 Ready"));
  socket.on("disconnect", () => setStatus("", "Disconnected"));
  socket.on("status",     d  => { setStatus(d.state, d.message); if (d.state === "solving") showTyping(true); else showTyping(false); });
  socket.on("solution",   d  => {
    showTyping(false);
    document.getElementById("solution-area").innerHTML = d.html;
    if (d.success) {
      solveCount++;
      document.getElementById("solve-count").textContent = solveCount;
      const now = new Date();
      document.getElementById("last-time").textContent =
        now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");
    }
  });

  // ── File selection ──
  function handleFile(file) {
    if (!file || !file.type.startsWith("image/")) return;
    selectedFile = file;
    const url = URL.createObjectURL(file);
    document.getElementById("preview-img").src = url;
    document.getElementById("preview-wrap").style.display = "block";
    document.getElementById("solve-btn").style.display = "block";
  }

  // Drag & drop input
  document.getElementById("drop-input").addEventListener("change", e => handleFile(e.target.files[0]));
  document.getElementById("camera-input").addEventListener("change",  e => handleFile(e.target.files[0]));
  document.getElementById("gallery-input").addEventListener("change", e => handleFile(e.target.files[0]));

  // Drag & drop visual
  const zone = document.getElementById("drop-zone");
  zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("drag-over"); });
  zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
  zone.addEventListener("drop", e => {
    e.preventDefault(); zone.classList.remove("drag-over");
    handleFile(e.dataTransfer.files[0]);
  });

  // ── Upload & Solve ──
  async function uploadAndSolve() {
    if (!selectedFile) return;
    const btn = document.getElementById("solve-btn");
    btn.disabled = true;
    btn.textContent = "⏳ Solving...";
    showTyping(true);
    setStatus("solving", "🧠 Solving with Claude AI...");

    const form = new FormData();
    form.append("image", selectedFile);

    try {
      const res = await fetch("/upload", { method: "POST", body: form });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || "Unknown error");
    } catch (err) {
      showTyping(false);
      setStatus("error", "❌ " + err.message);
      document.getElementById("solution-area").innerHTML =
        `<div class="error">Upload failed: ${err.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = "⚡ Solve This Question";
    }
  }

  // ── Helpers ──
  function setStatus(state, text) {
    document.getElementById("status-text").textContent = text;
    document.getElementById("dot").className = "status-dot " + (state || "");
  }
  function showTyping(show) {
    document.getElementById("typing").className = "typing" + (show ? " active" : "");
  }
</script>

</body>
</html>
