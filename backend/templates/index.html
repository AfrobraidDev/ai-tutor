<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Question Solver</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
      :root {
        --bg: #0a0a0f;
        --surface: #12121a;
        --card: #1a1a26;
        --border: #2a2a3e;
        --accent: #7c6aff;
        --accent2: #ff6a9b;
        --green: #4fffb0;
        --yellow: #ffd966;
        --text: #e8e8f0;
        --muted: #6b6b8a;
        --radius: 14px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Syne", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ── Noise grain overlay ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 999;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 32px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(
          90deg,
          rgba(124, 106, 255, 0.08),
          transparent
        );
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(12px);
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1.3rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .logo-icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        display: grid;
        place-items: center;
        font-size: 1.1rem;
      }

      .status-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        border-radius: 999px;
        background: var(--card);
        border: 1px solid var(--border);
        font-family: "Space Mono", monospace;
        font-size: 0.78rem;
        transition: all 0.3s;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        transition: background 0.3s;
      }
      .status-dot.running {
        background: var(--green);
        box-shadow: 0 0 8px var(--green);
        animation: pulse 1.5s infinite;
      }
      .status-dot.solving {
        background: var(--yellow);
        box-shadow: 0 0 8px var(--yellow);
        animation: pulse 0.8s infinite;
      }
      .status-dot.capturing {
        background: var(--accent2);
        box-shadow: 0 0 8px var(--accent2);
      }
      .status-dot.done {
        background: var(--green);
      }
      .status-dot.error {
        background: #ff5555;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* ── Main grid ── */
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr;
        gap: 20px;
        padding: 24px 32px;
        max-width: 1400px;
        margin: 0 auto;
        min-height: calc(100vh - 81px);
      }

      /* ── Control bar ── */
      .controls {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      .btn {
        padding: 10px 22px;
        border-radius: 9px;
        border: none;
        font-family: "Syne", sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.01em;
      }

      .btn-start {
        background: linear-gradient(135deg, var(--accent), #5a4ae0);
        color: #fff;
        box-shadow: 0 4px 20px rgba(124, 106, 255, 0.35);
      }
      .btn-start:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 28px rgba(124, 106, 255, 0.5);
      }

      .btn-stop {
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-stop:hover {
        background: var(--border);
      }

      .btn-now {
        background: linear-gradient(135deg, var(--accent2), #c0365e);
        color: #fff;
        box-shadow: 0 4px 20px rgba(255, 106, 155, 0.3);
      }
      .btn-now:hover {
        transform: translateY(-2px);
      }

      /* ── Countdown ring ── */
      .countdown-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-left: auto;
        font-family: "Space Mono", monospace;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .ring-svg {
        width: 46px;
        height: 46px;
        transform: rotate(-90deg);
      }
      .ring-bg {
        fill: none;
        stroke: var(--border);
        stroke-width: 4;
      }
      .ring-fill {
        fill: none;
        stroke: var(--accent);
        stroke-width: 4;
        stroke-linecap: round;
        stroke-dasharray: 113;
        stroke-dashoffset: 113;
        transition: stroke-dashoffset 0.9s linear;
      }
      .ring-label {
        position: absolute;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--accent);
        /* positioned via JS */
      }
      .ring-container {
        position: relative;
        width: 46px;
        height: 46px;
      }
      .ring-center {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Space Mono", monospace;
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--accent);
        transform: rotate(0deg);
      }

      /* ── Cards ── */
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .card-header {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .card-icon {
        font-size: 1rem;
      }

      .card-body {
        padding: 20px;
        flex: 1;
        overflow-y: auto;
      }

      /* ── Camera feed ── */
      #camera-card {
        grid-row: 2;
        grid-column: 1;
      }

      .camera-frame {
        width: 100%;
        aspect-ratio: 4/3;
        background: #090912;
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        border: 1px solid var(--border);
      }

      .camera-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
      }

      .camera-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 0.85rem;
        font-family: "Space Mono", monospace;
      }

      .camera-placeholder .cam-icon {
        font-size: 2.5rem;
        opacity: 0.4;
      }

      .capture-flash {
        position: absolute;
        inset: 0;
        background: white;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.1s;
      }

      .capture-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 4px 10px;
        border-radius: 6px;
        background: rgba(10, 10, 15, 0.7);
        backdrop-filter: blur(6px);
        font-family: "Space Mono", monospace;
        font-size: 0.72rem;
        color: var(--green);
        border: 1px solid rgba(79, 255, 176, 0.2);
        display: none;
      }

      /* ── Solution card ── */
      #solution-card {
        grid-row: 2;
        grid-column: 2;
      }

      .solution-content {
        font-size: 0.92rem;
        line-height: 1.75;
      }

      .solution-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 40px 20px;
        color: var(--muted);
        font-family: "Space Mono", monospace;
        font-size: 0.82rem;
        text-align: center;
      }
      .solution-placeholder .sol-icon {
        font-size: 2.5rem;
        opacity: 0.3;
      }

      /* ── Solution HTML blocks ── */
      .subject-tag {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 6px;
        background: linear-gradient(135deg, var(--accent), #5a4ae0);
        color: #fff;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .detected-question {
        background: rgba(124, 106, 255, 0.08);
        border-left: 3px solid var(--accent);
        padding: 12px 16px;
        border-radius: 0 8px 8px 0;
        margin-bottom: 16px;
        font-size: 0.88rem;
        color: var(--text);
      }

      .solution-steps {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 16px;
        line-height: 1.85;
        white-space: pre-wrap;
      }

      .final-answer {
        background: linear-gradient(
          135deg,
          rgba(79, 255, 176, 0.1),
          rgba(79, 255, 176, 0.04)
        );
        border: 1px solid rgba(79, 255, 176, 0.3);
        border-radius: 10px;
        padding: 14px 18px;
        font-size: 1rem;
        font-weight: 600;
        color: var(--green);
      }

      .no-question {
        color: var(--yellow);
        background: rgba(255, 217, 102, 0.07);
        border: 1px dashed rgba(255, 217, 102, 0.3);
        border-radius: 10px;
        padding: 16px;
        font-family: "Space Mono", monospace;
        font-size: 0.82rem;
      }

      .error {
        color: #ff5555;
        background: rgba(255, 85, 85, 0.07);
        border: 1px dashed rgba(255, 85, 85, 0.3);
        border-radius: 10px;
        padding: 16px;
        font-family: "Space Mono", monospace;
        font-size: 0.82rem;
      }

      /* ── Capture counter ── */
      .stat-row {
        display: flex;
        gap: 12px;
        margin-top: 14px;
      }

      .stat {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 10px 14px;
        font-family: "Space Mono", monospace;
      }
      .stat-val {
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--accent);
      }
      .stat-label {
        font-size: 0.7rem;
        color: var(--muted);
        margin-top: 2px;
      }

      /* ── Typing indicator ── */
      .typing {
        display: none;
        gap: 5px;
        align-items: center;
        padding: 12px 0;
      }
      .typing.active {
        display: flex;
      }
      .typing span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        animation: bounce 1s infinite;
      }
      .typing span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .typing span:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0.8);
          opacity: 0.4;
        }
        40% {
          transform: scale(1.2);
          opacity: 1;
        }
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }

      /* ── Responsive ── */
      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
          padding: 16px;
        }
        #camera-card,
        #solution-card {
          grid-column: 1;
          grid-row: auto;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <div class="logo-icon">🔬</div>
        Smart Question Solver
      </div>
      <div class="status-pill">
        <div class="status-dot" id="dot"></div>
        <span id="status-text">Disconnected</span>
      </div>
    </header>

    <div class="grid">
      <!-- Controls -->
      <div class="controls">
        <button class="btn btn-start" onclick="startSolver()">
          ▶ Start Auto-Solve
        </button>
        <button class="btn btn-stop" onclick="stopSolver()">⏹ Stop</button>
        <button class="btn btn-now" onclick="solveNow()">⚡ Solve Now</button>

        <div class="countdown-wrap">
          <span>Next capture in</span>
          <div class="ring-container">
            <svg class="ring-svg" viewBox="0 0 40 40">
              <circle class="ring-bg" cx="20" cy="20" r="18" />
              <circle class="ring-fill" cx="20" cy="20" r="18" id="ring-fill" />
            </svg>
            <div class="ring-center" id="countdown-num">—</div>
          </div>
        </div>
      </div>

      <!-- Camera Feed -->
      <div class="card" id="camera-card">
        <div class="card-header">
          <span class="card-icon">📸</span> Live Camera Feed
        </div>
        <div class="card-body">
          <div class="camera-frame" id="camera-frame">
            <div class="capture-flash" id="flash"></div>
            <img id="camera-img" alt="Camera feed" />
            <div class="camera-placeholder" id="cam-placeholder">
              <div class="cam-icon">📷</div>
              <div>Waiting for first capture...</div>
              <div style="font-size: 0.72rem; opacity: 0.6">
                Start the solver to begin
              </div>
            </div>
            <div class="capture-badge" id="capture-badge">● LIVE</div>
          </div>

          <div class="stat-row">
            <div class="stat">
              <div class="stat-val" id="capture-count">0</div>
              <div class="stat-label">Captures</div>
            </div>
            <div class="stat">
              <div class="stat-val" id="solve-count">0</div>
              <div class="stat-label">Solved</div>
            </div>
            <div class="stat">
              <div class="stat-val" id="interval-val">10s</div>
              <div class="stat-label">Interval</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Solution Panel -->
      <div class="card" id="solution-card">
        <div class="card-header">
          <span class="card-icon">🧠</span> AI Solution
        </div>
        <div class="card-body">
          <div class="typing" id="typing">
            <span></span><span></span><span></span>
            &nbsp; Claude is solving...
          </div>
          <div class="solution-content" id="solution-content">
            <div class="solution-placeholder">
              <div class="sol-icon">💡</div>
              <div>Solutions will appear here</div>
              <div style="font-size: 0.72rem; opacity: 0.5; margin-top: 4px">
                Point your camera at any question
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const socket = io();
      let captureCount = 0;
      let solveCount = 0;
      const TOTAL_SECS = 10;

      // ── Socket events ──
      socket.on("connect", () => setStatus("connected", "🟢 Connected"));
      socket.on("disconnect", () => setStatus("", "Disconnected"));

      socket.on("status", (d) => {
        setStatus(d.state, d.message);
        if (d.state === "solving") showTyping(true);
        else showTyping(false);
      });

      socket.on("countdown", (d) => {
        updateRing(d.seconds, d.total);
        document.getElementById("countdown-num").textContent = d.seconds;
      });

      socket.on("new_image", (d) => {
        const img = document.getElementById("camera-img");
        const placeholder = document.getElementById("cam-placeholder");
        const badge = document.getElementById("capture-badge");
        img.src = "data:image/jpeg;base64," + d.image;
        img.style.display = "block";
        placeholder.style.display = "none";
        badge.style.display = "block";
        flash();
        captureCount++;
        document.getElementById("capture-count").textContent = captureCount;
      });

      socket.on("solution", (d) => {
        showTyping(false);
        document.getElementById("solution-content").innerHTML = d.html;
        if (d.success) {
          solveCount++;
          document.getElementById("solve-count").textContent = solveCount;
        }
        // Smooth scroll to top of solution
        document.getElementById("solution-card").scrollTop = 0;
      });

      // ── Controls ──
      function startSolver() {
        socket.emit("start_solver");
      }
      function stopSolver() {
        socket.emit("stop_solver");
        document.getElementById("countdown-num").textContent = "—";
        resetRing();
      }
      function solveNow() {
        socket.emit("solve_now");
        showTyping(true);
      }

      // ── UI helpers ──
      function setStatus(state, text) {
        document.getElementById("status-text").textContent = text;
        const dot = document.getElementById("dot");
        dot.className = "status-dot " + (state || "");
      }

      function showTyping(show) {
        document.getElementById("typing").className =
          "typing" + (show ? " active" : "");
      }

      function flash() {
        const f = document.getElementById("flash");
        f.style.opacity = "0.6";
        setTimeout(() => (f.style.opacity = "0"), 150);
      }

      // ── Countdown ring ──
      const CIRC = 2 * Math.PI * 18; // ~113.1
      function updateRing(remaining, total) {
        const progress = remaining / total;
        const offset = CIRC * (1 - progress);
        document.getElementById("ring-fill").style.strokeDashoffset = offset;
      }
      function resetRing() {
        document.getElementById("ring-fill").style.strokeDashoffset = CIRC;
      }
    </script>
  </body>
</html>
